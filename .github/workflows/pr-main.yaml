---
name: Cass Operator Chart Checks

on:
  pull_request:
    branches:
      - main
    paths:
      - '.ct.yaml'
      - '.ct/**'
      - '.github/scripts/env_variables.sh'
      - '.github/workflows/pr-main.yaml'
      - 'charts/cass-operator/**'
      - 'charts/k8ssandra-common/**'
      - 'scripts/update-helm-deps.sh'

jobs:
  cass-operator-helm-unittest:
    name: cass-operator-helm-unittest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create env variables
        run: ./.github/scripts/env_variables.sh

      - name: Update chart dependencies
        run: scripts/update-helm-deps.sh

      - name: Install helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version "${HELM_UNITTEST_VERSION}"

      - name: Run helm-unittest
        run: helm unittest --with-subchart=false charts/cass-operator

  cass-operator-ct-lint:
    name: cass-operator-ct-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create env variables
        run: ./.github/scripts/env_variables.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install chart-testing Python dependencies
        run: python -m pip install --upgrade pip yamale yamllint

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0
        with:
          version: ${{ env.CT_VERSION }}

      - name: Update chart dependencies
        run: scripts/update-helm-deps.sh

      - name: Run ct lint
        run: ct lint --config .ct.yaml --charts charts/cass-operator --helm-extra-args '--api-versions=cert-manager.io/v1'

  cass-operator-ct-install:
    name: cass-operator-ct-install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create env variables
        run: ./.github/scripts/env_variables.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install chart-testing Python dependencies
        run: python -m pip install --upgrade pip yamale yamllint

      - name: Create Kind cluster
        uses: helm/kind-action@v1.13.0

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0
        with:
          version: ${{ env.CT_VERSION }}

      - name: Update chart dependencies
        run: scripts/update-helm-deps.sh

      - name: Install cert-manager
        run: |
          kubectl apply -f "https://github.com/cert-manager/cert-manager/releases/download/${CERT_MANAGER_VERSION}/cert-manager.yaml"
          kubectl wait --for=condition=Established crd/certificates.cert-manager.io --timeout=5m
          kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=5m

      - name: Create namespace
        run: kubectl create namespace cass-operator

      - name: Run ct install
        run: |
          ct install \
            --config .ct.yaml \
            --charts charts/cass-operator \
            --namespace cass-operator \
            --release-name cass-operator \
            --skip-clean-up

      - name: Verify deployed resources
        run: |
          selector='app.kubernetes.io/name=cass-operator,app.kubernetes.io/instance=cass-operator'
          kubectl rollout status deployment --selector="$selector" -n cass-operator --timeout=10m

      - name: Collect failure diagnostics
        if: failure()
        run: |
          selector='app.kubernetes.io/name=cass-operator,app.kubernetes.io/instance=cass-operator'
          kubectl get all -n cass-operator || true
          kubectl get deployment,service -n cass-operator -l "$selector" || true
          kubectl describe deployment -n cass-operator -l "$selector" || true
          kubectl describe service -n cass-operator -l "$selector" || true
          kubectl get validatingwebhookconfiguration -l "$selector" -o yaml || true
